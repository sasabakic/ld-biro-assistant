name: ld-biro-assistant

# Isolated sandbox so this project's install scripts never touch your Mac.
#
#   docker compose build                      # build the image (once)
#   docker compose run --rm app pnpm install   # SAFE install — scripts run in the container
#   docker compose run --rm app pnpm run build # verify a build in isolation
#   docker compose run --rm app bash           # shell into the sandbox
#   docker compose up app                      # dev server -> http://localhost:5174
#   docker compose down -v                     # tear down + delete the node_modules volume
#
# Note: this is the Vite app only. `wrangler dev`/Cloudflare Workers may need extra
# ports/login and is better run on the host. The repo is bind-mounted, so the
# pnpm-lock.yaml you generate lands back on the host. node_modules lives in a named
# volume, so the container's Linux binaries never overwrite your host's macOS ones.

services:
  app:
    build: .
    working_dir: /app
    # Install deps only if the volume is empty, then start the Vite dev server, so a
    # bare `docker compose up` works from a fresh clone.
    command:
      - sh
      - -c
      - "[ -e node_modules/.modules.yaml ] || pnpm install; exec pnpm exec vite --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    security_opt:
      - "no-new-privileges:true"   # install scripts can't escalate privileges
    cap_drop:
      - ALL                        # strip every Linux capability
    tmpfs:
      - /tmp
    init: true
    environment:
      - CI=false
      - CHOKIDAR_USEPOLLING=true   # reliable file-watching / HMR over macOS bind mounts
    volumes:
      - .:/app
      # Read-only overlays: nothing in the container can tamper with your git history
      # or editor config — a hostile install/build script writing here hits EROFS.
      - ./.git:/app/.git:ro
      - node_modules:/app/node_modules
      # pnpm relocates its content store next to the project (it won't hardlink
      # across the macOS bind mount), so capture /app/.pnpm-store in a volume —
      # otherwise it leaks ~400MB back into the repo on your host.
      - pnpm_store:/app/.pnpm-store

volumes:
  node_modules:
  pnpm_store:
