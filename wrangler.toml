name = "ld-biro-tracker"
compatibility_date = "2026-05-08"

# Production build output is configured in the Cloudflare Pages dashboard
# (Build command: `bun run build`, Output dir: `dist`). We don't set
# `pages_build_output_dir` here because it conflicts with `--proxy` mode
# in `wrangler pages dev` for local development.

# Local dev with: bun run pages:dev
# Secrets are configured per-environment in Cloudflare dashboard:
#   - GROQ_API_KEY
#   - GEMINI_API_KEY
#   - SUPABASE_URL
#   - SUPABASE_ANON_KEY

# For local dev, copy .env.example to .dev.vars
