name = "ld-biro-assistant"
main = "worker/index.ts"
compatibility_date = "2025-09-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Secrets configured in the Cloudflare dashboard (Workers & Pages → this project
# → Settings → Variables and Secrets):
#   - GROQ_API_KEY
#   - GEMINI_API_KEY
#   - SUPABASE_URL
#   - SUPABASE_ANON_KEY

# Local dev:
#   bun run build         # produces ./dist (assets)
#   bunx wrangler dev     # serves Worker + assets on http://localhost:8787
# For local dev, copy .env.example to .dev.vars
